services:
  - type: web
    name: urbansole-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE
        sync: false  # You'll set this on Render's dashboard
      - key: PORT
        value: 9000

  - type: static
    name: urbansole-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://urbansole-backend.onrender.com